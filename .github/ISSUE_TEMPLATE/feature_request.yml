name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What friction are you hitting?
      description: halias is driven by real workflow friction — describe the situation before the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds you've tried
